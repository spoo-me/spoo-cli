version: 2
project_name: spoo

builds:
  - id: spoo
    main: ./cmd/spoo
    binary: spoo
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

nfpms:
  - formats: [deb, rpm, apk]
    description: The official command-line client for spoo.me
    homepage: https://spoo.me
    license: Apache-2.0
    maintainer: spoo.me <support@spoo.me>

checksum:
  name_template: checksums.txt

changelog:
  use: github-native

