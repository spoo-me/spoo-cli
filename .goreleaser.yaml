version: 2
project_name: spoo

# Generate the man page once before building; fang's `man` command
# emits roff to stdout, which we gzip into the conventional location.
before:
  hooks:
    - sh -c "mkdir -p manpages && go run ./cmd/spoo man | gzip -9 -c > manpages/spoo.1.gz"

builds:
  - id: spoo
    main: ./cmd/spoo
    binary: spoo
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

nfpms:
  - formats: [deb, rpm, apk]
    description: The official command-line client for spoo.me
    homepage: https://spoo.me
    license: Apache-2.0
    maintainer: spoo.me <support@spoo.me>
    contents:
      - src: manpages/spoo.1.gz
        dst: /usr/share/man/man1/spoo.1.gz

checksum:
  name_template: checksums.txt

changelog:
  use: github-native

# Publishes the cask to spoo-me/homebrew-tap; needs the TAP_GITHUB_TOKEN
# secret (a PAT with write access to that repo) in the release workflow.
homebrew_casks:
  - repository:
      owner: spoo-me
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    commit_author:
      name: zingzy
      email: admin@spoo.me
    homepage: https://spoo.me
    description: The official command-line client for spoo.me
    # runs `spoo completion <shell>` during release and bundles the
    # scripts into the cask, so `brew install spoo-me/tap/spoo` wires up
    # bash/zsh/fish completion with no manual steps (GoReleaser ≥ v2.15)
    generate_completions_from_executable: true

# Publishes the manifest to spoo-me/scoop-bucket (same TAP_GITHUB_TOKEN).
scoops:
  - repository:
      owner: spoo-me
      name: scoop-bucket
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    commit_author:
      name: zingzy
      email: admin@spoo.me
    homepage: https://spoo.me
    description: The official command-line client for spoo.me
    license: Apache-2.0
